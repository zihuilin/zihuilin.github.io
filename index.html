<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zihui's Lab</title>
<style>
:root {
  --bg: #f8f9fb; --card: #fff; --text: #1a1a2e; --text2: #5d6d7e;
  --border: #e1e5eb; --blue: #2471a3; --green: #1e8449; --purple: #7d3c98;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: "PingFang SC","Microsoft YaHei","Noto Sans SC",-apple-system,sans-serif; background: var(--bg); color: var(--text); line-height: 1.7; }

.header {
  background: linear-gradient(135deg, #0f172a 0%, #1e1b4b 40%, #312e81 100%);
  color: #fff; text-align: center; padding: 60px 20px 48px;
}
.header h1 { font-size: 2em; font-weight: 800; letter-spacing: 3px; }
.header p { opacity: 0.6; margin-top: 10px; font-size: 0.95em; }

.container { max-width: 800px; margin: 0 auto; padding: 28px 16px; }

.project-card {
  display: flex; align-items: center; gap: 18px; padding: 22px 24px;
  background: var(--card); border: 1px solid var(--border); border-radius: 10px;
  margin-bottom: 14px; text-decoration: none; color: inherit; transition: all 0.15s;
}
.project-card:hover { border-color: var(--blue); box-shadow: 0 3px 16px rgba(36,113,163,0.1); transform: translateY(-2px); }
.project-icon { font-size: 2.2em; flex-shrink: 0; }
.project-info { flex: 1; }
.project-info .name { font-weight: 700; font-size: 1.05em; color: var(--text); }
.project-info .desc { font-size: 0.85em; color: var(--text2); margin-top: 3px; }
.project-arrow { font-size: 1.2em; color: #ccc; flex-shrink: 0; transition: color 0.15s; }
.project-card:hover .project-arrow { color: var(--blue); }

.footer { text-align: center; color: var(--text2); font-size: 0.78em; padding: 32px; border-top: 1px solid var(--border); margin-top: 40px; }
.footer a { color: var(--blue); }
</style>
</head>
<body>

<div class="header">
  <h1>Zihui's Lab</h1>
  <p>学习资料整理 · 数据可视化 · 工具集合</p>
</div>

<div class="container">

  <a href="gaokao-math/" class="project-card">
    <span class="project-icon">📐</span>
    <div class="project-info">
      <div class="name">高考数学真题 · 逐题拆解</div>
      <div class="desc">2016–2025 历年高考数学试卷逐题解析 —— 考点标记 · 思路拆解 · LaTeX 公式 · A4 打印友好</div>
    </div>
    <span class="project-arrow">→</span>
  </a>

  <!-- 未来项目在这里添加 ↓ -->

</div>

<div class="footer">
  <p><a href="https://github.com/zihuilin/zihuilin.github.io" target="_blank">zihuilin.github.io</a></p>
</div>

</body>
</html>
